<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - 五子棋大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .offline-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .offline-message {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .retry-button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .retry-button:hover {
            background: #3730a3;
        }
        
        .offline-tips {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon pulse">?</div>
        <h1 class="offline-title">离线模式</h1>
        <p class="offline-message">
            看起来您现在没有网络连接。别担心，五子棋游戏仍然可以正常使用！
        </p>
        
        <button class="retry-button" onclick="window.location.reload()">
            ? 重新连接
        </button>
        
        <div class="offline-tips">
            <p>? 离线状态下您仍可以：</p>
            <p>? 与AI对战</p>
            <p>? 查看游戏教程</p>
            <p>? 调整设置</p>
            <p>? 查看历史记录</p>
        </div>
    </div>

    <script>
        // 检测网络状态恢复
        window.addEventListener('online', function() {
            window.location.reload();
        });
        
        // 添加一些交互效果
        document.querySelector('.retry-button').addEventListener('click', function() {
            this.textContent = '? 正在重试...';
            this.disabled = true;
            
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
    </script>
</body>
</html>
