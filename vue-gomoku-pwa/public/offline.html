<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脌毛脧脽脛拢脢陆 - 脦氓脳脫脝氓麓贸脢娄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .offline-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .offline-message {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .retry-button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .retry-button:hover {
            background: #3730a3;
        }
        
        .offline-tips {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon pulse">?</div>
        <h1 class="offline-title">脌毛脧脽脛拢脢陆</h1>
        <p class="offline-message">
            驴麓脝冒脌麓脛煤脧脰脭脷脙禄脫脨脥酶脗莽脕卢陆脫隆拢卤冒碌拢脨脛拢卢脦氓脳脫脝氓脫脦脧路脠脭脠禄驴脡脪脭脮媒鲁拢脢鹿脫脙拢隆
        </p>
        
        <button class="retry-button" onclick="window.location.reload()">
            ? 脰脴脨脗脕卢陆脫
        </button>
        
        <div class="offline-tips">
            <p>? 脌毛脧脽脳麓脤卢脧脗脛煤脠脭驴脡脪脭拢潞</p>
            <p>? 脫毛AI露脭脮陆</p>
            <p>? 虏茅驴麓脫脦脧路陆脤鲁脤</p>
            <p>? 碌梅脮没脡猫脰脙</p>
            <p>? 虏茅驴麓脌煤脢路录脟脗录</p>
        </div>
    </div>

    <script>
        // 录矛虏芒脥酶脗莽脳麓脤卢禄脰赂麓
        window.addEventListener('online', function() {
            window.location.reload();
        });
        
        // 脤铆录脫脪禄脨漏陆禄禄楼脨搂鹿没
        document.querySelector('.retry-button').addEventListener('click', function() {
            this.textContent = '? 脮媒脭脷脰脴脢脭...';
            this.disabled = true;
            
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
    </script>
</body>
</html>
