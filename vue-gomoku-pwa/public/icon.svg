<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" id="icon" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 卤鲁戮掳脭虏脨脦 -->
  <circle cx="256" cy="256" r="240" fill="#2563eb" stroke="#1d4ed8" stroke-width="8"/>
  
  <!-- 脝氓脜脤脥酶赂帽卤鲁戮掳 -->
  <rect x="96" y="96" width="320" height="320" fill="#fef3c7" stroke="#92400e" stroke-width="2" rx="8"/>
  
  <!-- 脝氓脜脤脧脽脤玫 -->
  <g stroke="#92400e" stroke-width="1.5" opacity="0.6">
    <!-- 麓鹿脰卤脧脽 -->
    <line x1="136" y1="116" x2="136" y2="396" />
    <line x1="176" y1="116" x2="176" y2="396" />
    <line x1="216" y1="116" x2="216" y2="396" />
    <line x1="256" y1="116" x2="256" y2="396" />
    <line x1="296" y1="116" x2="296" y2="396" />
    <line x1="336" y1="116" x2="336" y2="396" />
    <line x1="376" y1="116" x2="376" y2="396" />
    
    <!-- 脣庐脝陆脧脽 -->
    <line x1="116" y1="136" x2="396" y2="136" />
    <line x1="116" y1="176" x2="396" y2="176" />
    <line x1="116" y1="216" x2="396" y2="216" />
    <line x1="116" y1="256" x2="396" y2="256" />
    <line x1="116" y1="296" x2="396" y2="296" />
    <line x1="116" y1="336" x2="396" y2="336" />
    <line x1="116" y1="376" x2="396" y2="376" />
  </g>
  
  <!-- 脝氓脳脫脳茅潞脧 - 脨脦鲁脡脦氓脕卢 -->
  <!-- 潞脷脳脫 -->
  <circle cx="176" cy="216" r="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <circle cx="216" cy="216" r="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <circle cx="256" cy="216" r="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <circle cx="296" cy="216" r="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <circle cx="336" cy="216" r="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  
  <!-- 掳脳脳脫脳掳脢脦 -->
  <circle cx="216" cy="176" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <circle cx="296" cy="176" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <circle cx="256" cy="256" r="14" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  
  <!-- 脢陇脌没鹿芒脨搂 -->
  <line x1="176" y1="216" x2="336" y2="216" stroke="#fbbf24" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  
  <!-- 卤锚脤芒脦脛脳脰 -->
  <text x="256" y="460" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#ffffff">脦氓脳脫脝氓</text>
</svg>